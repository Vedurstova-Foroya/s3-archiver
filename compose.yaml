x-archiver-temp-volume: &archiver-temp-volume
  type: bind
  source: ${ARCHIVER_TEMP_DIR:-/tmp/s3-archiver}
  target: ${ARCHIVER_TEMP_DIR:-/tmp/s3-archiver}
  bind:
    create_host_path: true

x-archiver-service: &archiver-service
  build:
    context: .
    dockerfile: Dockerfile
    target: runtime
  depends_on:
    localstack:
      condition: service_healthy
      required: false
  env_file:
    - ${APP_ENV_FILE:-.env}
  environment:
    APP_ENV_FILE: ${APP_ENV_FILE:-.env}
    ARCHIVER_TEMP_DIR: ${ARCHIVER_TEMP_DIR:-/tmp/s3-archiver}
    LOG_DIR: /var/log/s3-archiver
  labels:
    s3-archiver.env.ARCHIVER_CONFIG_JSON: env_file
  volumes:
    - app_logs:/var/log/s3-archiver
    - *archiver-temp-volume

services:
  # Generic one-off runner: `docker compose run --rm app <check|cleanup|...>`.
  app:
    <<: *archiver-service

  # One archive pass in the background: `docker compose up -d --build archive`,
  # then `docker compose logs -f archive`. Runs once and exits (no restart).
  archive:
    <<: *archiver-service
    command: ["archive"]

  # Long-running once-per-day UTC scheduler loop: `docker compose up -d scheduler`.
  scheduler:
    <<: *archiver-service
    command: ["schedule"]
    restart: unless-stopped
    stop_grace_period: ${ARCHIVER_SCHEDULER_STOP_GRACE_PERIOD:-2m}

  localstack:
    image: localstack/localstack:4.8.1
    profiles: ["test"]
    environment:
      AWS_DEFAULT_REGION: us-east-1
      SERVICES: s3
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "awslocal s3api list-buckets >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${LOCALSTACK_HOST_PORT:-4566}:4566"
    networks:
      default:
        aliases:
          - localstack-alt
    volumes:
      - ./docker/localstack/init/boot.d:/etc/localstack/init/boot.d:ro
      - ./docker/localstack/init/ready.d:/etc/localstack/init/ready.d:ro
      - ./docker/localstack/test-support:/opt/s3-archiver-test-support:ro

volumes:
  app_logs:
